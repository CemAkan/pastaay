version: 1
warmup_duration: "10s"
enable_default_ignored: true

ignored_commands:
  sql:
    - "SELECT 1"
  kafka:
    - "heartbeat"

policies:
  - name: "mongo-kill-switch"
    type: "mongo"
    target: "all"
    drop_connection: true

  - name: "sql-latency"
    type: "sql"
    target: "database"
    latency_chance: 1.0
    latency_duration: "500ms"

  - name: "http-random-fail"
    type: "http"
    target: "/api/v1/ping"
    error_chance: 0.5
    error_code: 503
    error_body: '{"error": "Pastaay Chaos: System Overloaded"}'

  - name: "redis-cache-miss"
    type: "redis"
    target: "all"
    error_chance: 0.2

  - name: "kafka-consumer-lag"
    type: "kafka"
    target: "events.stream"
    latency_chance: 0.5
    latency_duration: "800ms"

  - name: "rabbitmq-payment-drop"
    type: "rabbitmq"
    target: "chaos.queue"
    drop_connection: true
    error_chance: 0.3

  - name: "system-meltdown"
    type: "resource"
    target: "host"
    latency_duration: "15s"
    throttle_threshold: 150000
    ram_chunk_mb: 100
    ram_interval: "1s"