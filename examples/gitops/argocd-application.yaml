apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pastaay-chaos-experiments
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR-ORG/your-gitops-repo.git'
    targetRevision: HEAD
    path: chaos-engineering/production
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: pastaay-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true