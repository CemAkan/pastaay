---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - chaos.pastaay.io
  resources:
  - chaospolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - chaos.pastaay.io
  resources:
  - chaospolicies/status
  verbs:
  - get
  - patch
  - update
