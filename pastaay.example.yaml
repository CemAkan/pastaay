version: 1
policies:
  - name: "http-login-slowdown"
    type: "http"
    target: "/api/v1/login"
    latency_chance: 0.2
    latency_duration: "1500ms"

  - name: "sql-global-degradation"
    type: "sql"
    target: "database"
    latency_chance: 0.1
    latency_duration: "3s"

  - name: "redis-cache-miss-attack"
    type: "redis"
    target: "get"
    error_chance: 0.5