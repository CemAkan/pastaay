# .goreleaser.yaml
project_name: pastaayctl

before:
  hooks:
    - go mod tidy

builds:
  - id: pastaayctl
    dir: ./cmd/pastaayctl
    main: ./main.go
    binary: pastaayctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: CemAkan
    name: pastaay
  draft: false
  prerelease: auto